version: '3.9'

services:

  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: transflet_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-root_secret}
      MYSQL_DATABASE: ${DB_NAME:-transflet_db}
      MYSQL_USER: ${DB_USER:-transflet_user}
      MYSQL_PASSWORD: ${DB_PASS:-transflet_pass}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/02_seeds.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: transflet_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-transflet_db}
      DB_USER: ${DB_USER:-transflet_user}
      DB_PASS: ${DB_PASS:-transflet_pass}
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  # ── Nginx Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: transflet_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  # ── Adminer (dev only) ──────────────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: transflet_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles:
      - dev

volumes:
  mysql_data:
